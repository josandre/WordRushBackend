name: Word Rush CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore WordRush.sln

      - name: Build
        run: dotnet build WordRush.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test WordRush.sln --no-build --configuration Release --verbosity normal

  deploy:
    needs: build
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy
        run: echo "Deploying to develop environment..."
